services:
  rustle:
    build: .
    ports:
      - "${LISTEN_PORT:-32145}:${LISTEN_PORT:-32145}"
    environment:
      - LISTEN_PORT=${LISTEN_PORT:-32145}
      - TARGET_ADDR=${TARGET_ADDR:-backend:8080}
    restart: unless-stopped
    networks:
      - proxy

